# Action Predictor Image VAE 配置
# 使用 MultiImageObsEncoder + VAEModel 进行图像任务的动作预测
# 通过修改 task=<task>_image 切换任务，默认 pusht_image

defaults:
  - _self_
  - task: pusht_image

name: train_action_predictor_image_vae
_target_: diffusion_policy.workspace.train_action_predictor_image_workspace.TrainActionPredictorImageWorkspace

# 维度信息
# encoder 输出维度（SmallConvEncoder embed_dim）
encoder_output_dim: 128

# 从任务的 shape_meta 中推断动作维度
action_dim: ${task.shape_meta.action.shape[0]}
keypoint_dim: 0
horizon: 16
n_obs_steps: 2
n_action_steps: 8
n_latency_steps: 0
past_action_visible: False
keypoint_visible_rate: 1.0

# 一些任务配置引用的观测步数
dataset_obs_steps: ${n_obs_steps}

prev_action_horizon: 8

# Policy 配置 - 使用 Image VAE Policy
policy:
  _target_: diffusion_policy.policy.action_predictor_image_vae_policy.ActionPredictorImageVAEPolicy

  encoder:
    _target_: diffusion_policy.model.vision.multi_image_obs_encoder.MultiImageObsEncoder
    shape_meta: ${task.shape_meta}
    rgb_model:
      _target_: diffusion_policy.model.vision.small_conv_encoder.SmallConvEncoder
      in_channels: 3
      embed_dim: ${encoder_output_dim}
    resize_shape: null
    crop_shape: null
    random_crop: False
    use_group_norm: False
    share_rgb_model: True
    imagenet_norm: False

  model:
    _target_: diffusion_policy.model.action_predictor.vae_action_predictor.VAEModel
    action_dim: ${action_dim}
    action_horizon: ${horizon}
    # obs_dim 是 encoder 输出维度（单帧特征维度）
    obs_dim: ${encoder_output_dim}
    obs_horizon: ${n_obs_steps}
    latent_dim: 32
    layer: 256
    use_ema: True
    pretrain: False
    ckpt_path: null
    # temperature: 1.0  # 如果 VAEModel 支持则取消注释

  horizon: ${horizon}
  n_action_steps: ${n_action_steps}
  n_obs_steps: ${n_obs_steps}
  temperature: 1.0

# 数据加载器配置（图像任务，适中 batch 以控显存）
dataloader:
  batch_size: 64
  num_workers: 4
  shuffle: True
  pin_memory: True
  persistent_workers: True

val_dataloader:
  batch_size: 64
  num_workers: 4
  shuffle: False
  pin_memory: True
  persistent_workers: True

# 优化器配置
optimizer:
  lr: 1.0e-4
  betas: [0.9, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-4

# 训练配置
training:
  device: "cuda:0"
  seed: 42
  debug: False
  resume: False
  lr_scheduler: cosine
  lr_warmup_steps: 500
  num_epochs: 1000
  gradient_accumulate_every: 1
  use_ema: False
  rollout_every: 50
  checkpoint_every: 50
  val_every: 10
  sample_every: 10
  freeze_encoder: False
  max_train_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0

# 日志配置
logging:
  project: action_predictor_image_vae
  resume: True
  mode: online
  name: "${name}_${task.name}"
  tags: ["${name}", "${task.name}"]
  id: null
  group: null

# checkpoint 配置
checkpoint:
  save_last_ckpt: True
  save_last_snapshot: False
  topk:
    monitor_key: val_loss
    mode: min
    k: 3
    format_str: "epoch={epoch:03d}-val_loss={val_loss:.4f}.ckpt"

# 多运行配置
hydra:
  run:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task.name}
  sweep:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task.name}
    subdir: ${hydra.job.num}
