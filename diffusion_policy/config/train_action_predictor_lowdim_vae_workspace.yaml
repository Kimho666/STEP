# Generic VAE Action Predictor for lowdim robomimic-style tasks
# Usage examples:
#   python train.py --config-name train_action_predictor_lowdim_vae_workspace           # uses default task (pusht_lowdim)
#   python train.py --config-name train_action_predictor_lowdim_vae_workspace task=can_lowdim
#   python train.py --config-name train_action_predictor_lowdim_vae_workspace task=kitchen_lowdim

defaults:
  - _self_
  - task: pusht_lowdim   # can be overridden via CLI: task=can_lowdim, task=kitchen_lowdim, etc.

name: train_action_predictor_lowdim_vae
_target_: diffusion_policy.workspace.train_action_predictor_lowdim_workspace.TrainActionPredictorLowdimWorkspace

# dims from task
obs_dim: ${task.obs_dim}
action_dim: ${task.action_dim}
keypoint_dim: ${task.keypoint_dim}
task_name: ${task.name}
exp_name: "vae"

# sequence
horizon: 16
n_obs_steps: 2
n_action_steps: 8
n_latency_steps: 0
past_action_visible: False
keypoint_visible_rate: 1.0
prev_action_horizon: 8

# VAE backend
use_vae: True
policy:
  _target_: diffusion_policy.policy.action_predictor_lowdim_policy.ActionPredictorLowdimPolicy
  backend: vae
  model:
    _target_: diffusion_policy.model.action_predictor.vae_action_predictor.VAEModel
    action_dim: ${action_dim}
    action_horizon: ${horizon}
    obs_dim: ${obs_dim}
    obs_horizon: ${n_obs_steps}
    latent_dim: 32
    layer: 256
    use_ema: True
    pretrain: False
    ckpt_path: null
  horizon: ${horizon}
  obs_dim: ${obs_dim}
  action_dim: ${action_dim}
  n_action_steps: ${n_action_steps}
  n_obs_steps: ${n_obs_steps}
  prev_action_horizon: ${prev_action_horizon}

# keep a top-level vae_model for backward-compatible workspace init
vae_model:
  _target_: diffusion_policy.model.action_predictor.vae_action_predictor.VAEModel
  action_dim: ${action_dim}
  action_horizon: ${horizon}
  obs_dim: ${obs_dim}
  obs_horizon: ${n_obs_steps}
  latent_dim: 32
  layer: 256
  use_ema: True
  pretrain: False
  ckpt_path: null
  temperature: 1.0  # 采样温度，控制z噪声强度，默认1.0匹配N(0,I)

# dataloaders
dataloader:
  batch_size: 256
  num_workers: 4
  shuffle: True
  pin_memory: True
  persistent_workers: True

val_dataloader:
  batch_size: 256
  num_workers: 4
  shuffle: False
  pin_memory: True
  persistent_workers: True

# optimizer
optimizer:
  lr: 1.0e-4
  betas: [0.9, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-4

# training
training:
  device: "cuda:0"
  seed: 42
  debug: False
  resume: False
  lr_scheduler: cosine
  lr_warmup_steps: 500
  num_epochs: 3000
  gradient_accumulate_every: 1
  use_ema: False
  rollout_every: 50
  checkpoint_every: 50
  val_every: 10
  sample_every: 10
  max_train_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0

logging:
  project: action_predictor_vae
  resume: True
  mode: online
  name: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}
  tags: ["${name}", "${task_name}", "${exp_name}"]
  id: null
  group: null

checkpoint:
  topk:
    monitor_key: val_loss
    mode: min
    k: 5
    format_str: 'epoch={epoch:04d}-val_loss={val_loss:.3f}.ckpt'
  save_last_ckpt: True
  save_last_snapshot: False

multi_run:
  run_dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}

hydra:
  job:
    chdir: False
  run:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  sweep:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
    subdir: ${hydra.job.num}
